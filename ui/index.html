<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8" />
        <title>CDBets</title>
        <link rel="stylesheet" href="colors.css" />
        <link rel="stylesheet" href="styles.css" />
        <link rel="stylesheet" href="frame.css" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div id="phone-wrapper">
            <div class="app" id="content" data-theme="dark">
                <div class="screen">
                    <!-- Top bar -->
                    <header class="top-bar" id="top-bar">
                        <div class="top-bar-inner">
                            <div class="brand">
                                <img class="brand-logo" src="assets/logo-icon.png" alt="CDBets" width="28" height="28" />
                                <div>
                                    <div class="brand-name">CD<span class="accent">Bets</span></div>
                                    <div class="brand-tag">Premium Casino</div>
                                </div>
                            </div>
                            <div class="top-bar-actions">
                                <div class="balance-pill"><span class="gem">💎</span><span id="balance-pill">R$ 0,00</span></div>
                                <button class="icon-btn" type="button" aria-label="Notificações">🔔<span class="dot"></span></button>
                            </div>
                        </div>
                    </header>

                    <!-- Active view (rendered by script.js) -->
                    <main class="screen-scroll" id="view"></main>

                    <!-- Bottom nav -->
                    <nav class="bottom-nav" id="bottom-nav">
                        <div class="bottom-nav-inner">
                            <button class="nav-item" data-route="/" type="button">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                                    <polyline points="9 22 9 12 15 12 15 22"/>
                                </svg>
                                <span class="label">Início</span>
                            </button>
                            <button class="nav-item" data-route="/jogos" type="button">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <line x1="6" x2="10" y1="11" y2="11"/>
                                    <line x1="8" x2="8" y1="9" y2="13"/>
                                    <line x1="15" x2="15.01" y1="12" y2="12"/>
                                    <line x1="18" x2="18.01" y1="10" y2="10"/>
                                    <path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258A4 4 0 0 0 17.32 5z"/>
                                </svg>
                                <span class="label">Jogos</span>
                            </button>
                            <button class="nav-item" data-route="/carteira" type="button">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"/>
                                    <path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/>
                                </svg>
                                <span class="label">Carteira</span>
                            </button>
                            <button class="nav-item" data-route="/perfil" type="button">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
                                    <circle cx="12" cy="7" r="4"/>
                                </svg>
                                <span class="label">Perfil</span>
                            </button>
                        </div>
                    </nav>

                    <!-- Toast layer (rendered into by script.js) -->
                    <div class="toast-wrap" id="toast-wrap"></div>
                </div>
            </div>
        </div>

        <script src="dev.js"></script>
        <script>
            window.addEventListener('message', (e) => {
                if (e.data === 'componentsLoaded') {
                    const script = document.createElement('script');
                    script.src = 'script.js';
                    document.body.appendChild(script);
                }
            });

            // When running outside of LB Phone (browser preview), there are no
            // components to wait for — boot the app immediately.
            if (!window.invokeNative) {
                window.addEventListener('load', () => {
                    const script = document.createElement('script');
                    script.src = 'script.js';
                    document.body.appendChild(script);
                });
            }
        </script>
    </body>
</html>
